<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan · Family Activities</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0e0e0e;
  --surface: #161616;
  --raised:  #1e1e1e;
  --border:  #2a2a2a;
  --border2: #3a3a3a;
  --ink:     #efefef;
  --muted:   #777;
  --dim:     #333;
  --orange:  #ff5a1f;
  --teal:    #00c4a0;
  --purple:  #a78bfa;
  --gold:    #e8b84b;
  --green:   #4ade80;
  --pink:    #f472b6;
  --red:     #f87171;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Nav ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
}
.nav-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  padding: 14px 16px;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--orange); border-bottom-color: var(--orange); }

/* ── Hero ── */
.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 36px 28px 28px;
}
.hero-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 11vw, 96px);
  line-height: 0.92;
  color: var(--ink);
}
.hero-title .outline {
  color: transparent;
  -webkit-text-stroke: 1.5px var(--purple);
}
.hero-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 14px;
}
.chip {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px 10px;
  background: var(--raised);
}
.chip b { color: var(--ink); font-weight: 500; }

/* ── Filter bar ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}
.filter-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-right: 4px;
}
.ftab {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  background: none;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.ftab:hover { color: var(--ink); border-color: var(--border2); }
.ftab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* ── Main ── */
.main { max-width: 960px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── City section ── */
.city-section { margin-bottom: 52px; }

.city-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.city-icon { font-size: 28px; line-height: 1; }
.city-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  color: var(--ink);
  line-height: 1;
}
.city-tagline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
  text-align: right;
  line-height: 1.4;
}

/* ── Activity grid ── */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* ── Activity card ── */
.act-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .15s, transform .15s;
  display: flex;
  flex-direction: column;
}
.act-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.act-card-header {
  padding: 14px 16px 10px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.act-emoji { font-size: 28px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
.act-title-block { flex: 1; min-width: 0; }
.act-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 4px;
}
.act-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.act-tag {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 3px;
}
.tag-must    { background: rgba(244,114,182,.12); color: var(--pink); }
.tag-kids    { background: rgba(74,222,128,.12);  color: var(--green); }
.tag-thrill  { background: rgba(255,90,31,.12);   color: var(--orange); }
.tag-culture { background: rgba(167,139,250,.12); color: var(--purple); }
.tag-sport   { background: rgba(232,184,75,.12);  color: var(--gold); }
.tag-art     { background: rgba(0,196,160,.12);   color: var(--teal); }
.tag-nature  { background: rgba(59,130,246,.12);  color: #60a5fa; }
.tag-free    { background: rgba(74,222,128,.08);  color: var(--green); border: 1px solid rgba(74,222,128,.2); }

.act-body {
  padding: 0 16px 12px;
  flex: 1;
}
.act-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: 10px;
}
.act-desc b { color: var(--ink); font-weight: 500; }

/* Booking urgency */
.act-urgency {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 4px;
  margin-bottom: 10px;
  line-height: 1.4;
}
.urgency-high   { background: rgba(248,113,113,.1); color: var(--red); border-left: 2px solid var(--red); }
.urgency-med    { background: rgba(232,184,75,.08); color: var(--gold); border-left: 2px solid var(--gold); }
.urgency-low    { background: rgba(74,222,128,.06); color: var(--green); border-left: 2px solid var(--green); }
.urgency-walkin { background: rgba(119,119,119,.1); color: var(--muted); border-left: 2px solid var(--dim); }

/* Price hint */
.act-price {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 10px;
}
.act-price span { color: var(--ink); }

/* Booking links */
.act-links {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--raised);
}

.book-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  text-decoration: none;
  background: var(--bg);
  transition: all .15s;
}
.book-link:hover { border-color: var(--purple); background: rgba(167,139,250,.05); }
.book-link.primary { border-color: var(--purple); background: rgba(167,139,250,.06); }
.book-link.primary:hover { background: rgba(167,139,250,.12); }

.bl-icon { font-size: 14px; flex-shrink: 0; }
.bl-body { flex: 1; min-width: 0; }
.bl-name { font-size: 12px; font-weight: 500; color: var(--ink); }
.bl-sub  { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 1px; }
.bl-arrow { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.book-link:hover .bl-arrow { color: var(--purple); }

/* No-book note */
.no-book {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 8px 10px;
  background: var(--bg);
  border-radius: 5px;
  border: 1px solid var(--border);
  line-height: 1.5;
}
</style>
</head>

<div class="main" id="main"></div>

// ── Render ────────────────────────────────────────────────
let activeFilter = 'all';

function filterActs(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll() {
  const main = document.getElementById('main');
  let html = '';

  CITIES.forEach(city => {
    const visible = city.activities.filter(a =>
      activeFilter === 'all' || a.tags.includes(activeFilter)
    );
    if (!visible.length) return;

    html += `
      <div class="city-section" data-city="${city.id}">
        <div class="city-header">
          <span class="city-icon">${city.icon}</span>
          <span class="city-name">${city.name}</span>
          <span class="city-tagline">${city.tagline.replace('\n','<br>')}</span>
        </div>
        <div class="activity-grid">
          ${visible.map(act => renderCard(act)).join('')}
        </div>
      </div>
    `;
  });

  if (!html) {
    html = `<div style="text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px">No activities match this filter.</div>`;
  }

  main.innerHTML = html;
}

function renderCard(act) {
  const tagHtml = act.tags.map(t =>
    `<span class="act-tag tag-${t}">${tagLabel(t)}</span>`
  ).join('');

  const urgencyHtml = `<div class="act-urgency urgency-${act.urgency.level}">${act.urgency.text}</div>`;

  const priceHtml = `<div class="act-price">💷 <span>${act.price}</span></div>`;

  const linksHtml = act.links.map(l => `
    <a class="book-link${l.primary ? ' primary' : ''}" href="${l.url}" target="_blank" rel="noopener">
      <span class="bl-icon">${l.icon}</span>
      <span class="bl-body">
        <span class="bl-name">${l.name}</span>
        <span class="bl-sub">${l.sub}</span>
      </span>
      <span class="bl-arrow">↗</span>
    </a>
  `).join('');

  return `
    <div class="act-card" data-tags="${act.tags.join(' ')}">
      <div class="act-card-header">
        <span class="act-emoji">${act.emoji}</span>
        <div class="act-title-block">
          <div class="act-name">${act.name}</div>
          <div class="act-tags">${tagHtml}</div>
        </div>
      </div>
      <div class="act-body">
        <div class="act-desc">${act.desc}</div>
        ${urgencyHtml}
        ${priceHtml}
      </div>
      <div class="act-links">${linksHtml}</div>
    </div>
  `;
}

function tagLabel(t) {
  const labels = {
    must:'⭐ Must-do', kids:'👶 Kids', thrill:'🎢 Thrill', culture:'⛩ Culture',
    sport:'🏟 Sport', art:'🎨 Art', nature:'🌿 Nature', free:'🆓 Free', food:'🍜 Food'
  };
  return labels[t] || t;
}

// Init
renderAll();
